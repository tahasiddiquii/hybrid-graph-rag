name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Tests
        run: pytest -q

      - name: Benchmark gate (synthetic corpus)
        run: hybrid-rag benchmark

      - name: SciFact benchmark (5,183 real docs, 300 test queries)
        run: hybrid-rag benchmark --scifact
